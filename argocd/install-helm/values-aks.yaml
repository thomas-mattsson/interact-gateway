server:
  # ArgoCD must run in insecure mode when TLS is terminated at the Ingress
  extraArgs:
    - --insecure

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-passthrough: "false"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      cert-manager.io/cluster-issuer: letsencrypt-prod
    # AKS cluster: itzaks-nurmlarj (westeurope) — point this hostname DNS to 108.141.49.68
    hostname: argocd.itzaks-nurmlarj.westeurope.cloudapp.azure.com
    tls: true
    extraTls:
      - hosts:
          - argocd.itzaks-nurmlarj.westeurope.cloudapp.azure.com
        secretName: argocd-tls

configs:
  params:
    # Required when TLS is terminated at the Ingress
    server.insecure: "true"

  cm:
    # Required for SSO redirect URIs and the UI login link
    url: https://argocd.itzaks-nurmlarj.westeurope.cloudapp.azure.com

repoServer:
  replicas: 1

applicationSet:
  replicas: 1

notifications:
  enabled: true

redis:
  enabled: true

dex:
  # Disable Dex if you are not using SSO
  enabled: false

global:
  # Resource limits — tune per environment
  resources:
    limits:
      cpu: 1
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 128Mi
