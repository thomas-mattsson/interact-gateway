apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-operator
  namespace: argocd
  labels:
    group: applications
spec:
  project: default
  source:
    path: ./components/envoy/operator
  destination:
    namespace: envoy-gateway-system
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
    - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true