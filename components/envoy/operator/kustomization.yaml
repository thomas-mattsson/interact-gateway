apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- https://github.com/envoyproxy/gateway/releases/download/v1.7.0/install.yaml

patches:
  - target:
      kind: ConfigMap
      name: envoy-gateway-config
      namespace: envoy-gateway-system
    patch: |-
      - op: replace
        path: /data/envoy-gateway.yaml
        value: |
          apiVersion: gateway.envoyproxy.io/v1alpha1
          kind: EnvoyGateway
          extensionApis:
            enableBackend: true
          gateway:
            controllerName: gateway.envoyproxy.io/gatewayclass-controller
          logging:
            level:
              default: info
          provider:
            type: Kubernetes
            kubernetes:
              rateLimitDeployment:
                container:
                  image: docker.io/envoyproxy/ratelimit:3fb70258
                patch:
                  type: StrategicMerge
                  value:
                    spec:
                      template:
                        spec:
                          containers:
                          - imagePullPolicy: IfNotPresent
                            name: envoy-ratelimit
              shutdownManager:
                image: docker.io/envoyproxy/gateway:v1.7.0
