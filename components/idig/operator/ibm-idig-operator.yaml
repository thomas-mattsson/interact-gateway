                                    type: boolean
                                  name:
                                    description: Name of the license
                                    type: string
                                type: object
                              type: array
                            name:
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                      versions:
                        description: Available Versions
                        items:
                          properties:
                            licenses:
                              items:
                                properties:
