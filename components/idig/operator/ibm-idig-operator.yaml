apiVersion: apps/v1
kind: Deployment
metadata:
  name: idig-operator
  namespace: idig
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: idig-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: idig-operator
    spec:
      containers:
      - args:
        - --leader-elect
        command:
        - /entrypoint.sh
        - /manager
        env:
        - name: WATCH_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: icr.io/idig/idig-operator:op.1.0.1.g.f8429c7.b.master.n.213
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /healthz
            port: probes
        name: manager
        ports:
        - containerPort: 8082
          name: metrics
        - containerPort: 8083
          name: probes
        readinessProbe:
          httpGet:
            path: /readyz
            port: probes
      imagePullSecrets:
      - name: ibm-entitlement-key
      serviceAccountName: idig-operator-controller-manager
