apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: max-map-count-setter
  namespace: idig
  labels:
    app.kubernetes.io/name: max-map-count-setter
    app.kubernetes.io/component: node-tuning
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: max-map-count-setter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: max-map-count-setter
    spec:
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: max-map-count-setter
          image: docker.io/library/busybox:1.36.1
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              nsenter --mount=/proc/1/ns/mnt -- sysctl -w vm.max_map_count=262144
              sleep infinity
          resources:
            requests:
              cpu: 1m
              memory: 16Mi
            limits:
              cpu: 10m
              memory: 16Mi
