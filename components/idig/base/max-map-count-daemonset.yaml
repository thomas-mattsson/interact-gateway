apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: max-map-count-setter
  namespace: idig
  labels:
    app.kubernetes.io/name: max-map-count-setter
    app.kubernetes.io/component: node-tuning
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: max-map-count-setter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: max-map-count-setter
    spec:
      initContainers:
        - name: max-map-count-setter
          image: busybox:1.36
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - sysctl -w vm.max_map_count=262144
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 1m
              memory: 1Mi
            limits:
              cpu: 1m
              memory: 1Mi
      tolerations:
        - operator: Exists
