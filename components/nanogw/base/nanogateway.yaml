apiVersion: nanogateway.apiconnect.ibm.com/v1beta1
kind: NanoGatewayCluster
metadata:
  name: ngw
spec:
  profile: n1xc2.m4
  version: 12.1.0.3
  license: {}
  imagePullSecrets:
  - ibm-entitlement-key-nano
  imageRegistry: cp.icr.io/cp/apic
  #mtlsValidateClient: false
  jwksUrl: https://api.mycluster-eu-de-1-bxf-8x3-e7d3d93b8b317d269525bf063b24f98d-0000.eu-de.containers.appdomain.cloud/api/cloud/oauth2/certs
  certManagerIssuer:
    kind: Issuer
    name: selfsigning-issuer
  microServiceSecurity: certManager
  mgmtClientSubjectDN: CN=nano-gateway-mgmt-client,O=cert-manager
  mgmtEndpoint:
    annotations:
      cert-manager.io/issuer: ingress-issuer
    hosts:
      - name: apic-gateway-proxy.mycluster-eu-de-1-bxf-8x3-e7d3d93b8b317d269525bf063b24f98d-0000.eu-de.containers.appdomain.cloud
        secretName: gateway-proxy-endpoint
  redis:
    hosts:
    - valkey.nanogw.svc.cluster.local
    port: 6379
    mode: standalone
    credential:
      secretName: valkey-secret
    tls:
      secretName: valkey-tls-secret
  gatewayDomain: nanogw.mycluster-eu-de-1-bxf-8x3-e7d3d93b8b317d269525bf063b24f98d-0000.eu-de.containers.appdomain.cloud
